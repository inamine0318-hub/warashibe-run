<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="氷島の卵">
<meta name="theme-color" content="#060C14">
<title>氷島の卵</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
a,button,input,[onclick]{touch-action:manipulation;}
:root{
  --bg:#060C14;--panel:#08101E;--border:#12284A;--text:#8AB8D8;
  --accent:#2A90E0;--floor:#080F1C;--wall:#0A1C36;--abyss:#020408;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Courier New',monospace;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  user-select:none;-webkit-tap-highlight-color:transparent;overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
#app{width:100%;max-width:420px;}
/* ── TITLE / SELECT ── */
.screen{padding:12px;}
.logo{
  text-align:center;padding:18px 0 10px;
  font-size:22px;font-weight:900;letter-spacing:3px;
  color:#8AC8EC;text-shadow:0 0 20px #2A90E0,0 0 40px #1A6090;
}
.logo-sub{font-size:10px;color:#2A4A6A;letter-spacing:4px;margin-top:2px;}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.char-card{
  background:var(--panel);border:2px solid var(--border);
  border-radius:3px;padding:10px;cursor:pointer;transition:border-color .12s;
}
.char-card:hover,.char-card:active{border-color:var(--accent);}
.char-card-inner{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.char-label{font-size:13px;font-weight:bold;margin-bottom:2px;}
.char-hp-lbl{font-size:10px;color:#6A9CC0;}
.char-skill-lbl{font-size:9px;opacity:.75;margin-top:3px;}
.char-skill-name{font-size:9px;margin-top:4px;font-weight:bold;}
.diff-card{
  background:var(--panel);border:2px solid var(--border);
  border-radius:3px;padding:12px;cursor:pointer;margin-bottom:8px;
  transition:border-color .12s;
}
.diff-card:hover{border-color:var(--accent);}
.diff-title{font-size:14px;font-weight:bold;margin-bottom:4px;}
.diff-desc{font-size:10px;color:#546E7A;margin-top:3px;}
/* ── GAME LAYOUT ── */
.game-wrap{width:100%;display:flex;flex-direction:column;}
.hdr{
  background:var(--panel);border-bottom:2px solid var(--border);
  padding:6px 10px;
}
.hdr-row1{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hdr-name{font-weight:900;font-size:12px;min-width:72px;}
.hdr-turn{font-size:10px;color:#4A7A9B;margin-left:auto;}
.bar-wrap{display:flex;align-items:center;gap:5px;font-size:9px;margin-bottom:2px;}
.bar-lbl{min-width:18px;}
.bar-bg{flex:1;height:9px;background:#04090F;border:1px solid var(--border);}
.bar-fill{height:100%;transition:width .2s;}
.bar-val{min-width:44px;font-size:9px;text-align:right;}
/* ── GRID (scrollable) ── */
.grid-area{
  background:#020609;overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
  height:52vw;max-height:340px;min-height:200px;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  position:relative;
}
.grid{
  display:grid;grid-template-columns:repeat(8,44px);
  grid-template-rows:repeat(36,44px);gap:1px;
  background:#010305;padding:1px;
  width:fit-content;
}
.cell{
  width:44px;height:44px;position:relative;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
}
.c-floor{background:var(--floor);}
.c-wall{background:var(--wall);}
.c-abyss{background:var(--abyss);}
.c-airplane{background:#003D50;}
.c-baggage{background:#2A1C0C;}
.c-battery{background:#0C2410;}
.c-spare{background:#141C28;}
.c-egg{background:#06101E;}
.c-fuel{background:#18060A;}
.c-nav{background:#181408;}
.c-parts{background:#0C1018;}
.c-frozen-hit{background:#0A2040;}
.c-snow{background:#0A1828;}
.c-fog{background:#060C14;}
.c-target{outline:2px solid #FFE030;z-index:3;box-shadow:0 0 6px #FFE03066 inset;}
.c-collapse-warn{background:#220A04;}
.c-hole{background:#010204;}
.c-cracked{background:#0D1828;}
/* ── DICE ── */
.dice-area{
  display:flex;align-items:center;gap:10px;
  padding:6px 10px;background:#0A1828;
  border-bottom:1px solid var(--border);
  min-height:54px;
}
.dice-face{
  width:40px;height:40px;background:#0D2040;
  border:2px solid var(--accent);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:#FFF;
  transition:all .05s;
}
.dice-face.rolling{border-color:#FFEB3B;color:#FFEB3B;}
.roll-btn{
  flex:1;padding:8px;background:#1A3D6B;
  border:2px solid var(--accent);color:#A8D8F8;
  font-size:12px;font-family:monospace;font-weight:bold;cursor:pointer;
  border-radius:3px;
}
.roll-btn:disabled{opacity:.35;cursor:not-allowed;}
.steps-info{font-size:11px;color:#90CAF9;min-width:60px;}
/* ── INVENTORY ── */
.inv-bar{
  display:flex;gap:4px;flex-wrap:wrap;
  padding:4px 8px;background:#091420;border-bottom:1px solid var(--border);
}
.inv-chip{font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid;}
.inv-have{border-color:#55A46B;color:#90D4A8;background:#113322;}
.inv-need{border-color:#2A4060;color:#3A6085;}
/* ── LOG ── */
.log{
  padding:4px 8px;background:var(--panel);
  min-height:50px;max-height:66px;overflow-y:auto;
  border-bottom:1px solid var(--border);
}
.log div{font-size:9px;padding:1px 0;}
.l-info{color:#5B9BD5;}.l-success{color:#56C97B;}
.l-warning{color:#E8A838;}.l-danger{color:#E85858;}
/* ── CONTROLS ── */
.ctrl{
  background:var(--panel);padding:8px;
  display:flex;gap:10px;align-items:flex-start;justify-content:center;
}
.dpad{
  display:grid;grid-template-columns:44px 44px 44px;
  grid-template-rows:44px 44px 44px;gap:2px;
}
.dbtn{
  background:var(--border);border:2px solid #245087;color:#B0CCEC;
  font-size:17px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:3px;
}
.dbtn:active{background:#245087;}
.dbtn-blank{background:transparent;border:none;pointer-events:none;}
.act-col{display:flex;flex-direction:column;gap:4px;padding-top:2px;}
.act-btn{
  background:#0E2244;border:2px solid var(--border);color:var(--text);
  padding:5px 10px;font-size:10px;font-family:monospace;cursor:pointer;
  border-radius:2px;min-width:105px;text-align:center;
}
.act-btn:disabled{opacity:.35;cursor:not-allowed;}
.act-btn.on{border-color:#FFEB3B;color:#FFEB3B;}
.end-btn{background:#0C2A1A;border-color:#1A6038;color:#56C97B;}
.ctrl-notes{font-size:9px;text-align:center;padding:0 6px;margin-top:2px;}
/* ── OVERLAYS ── */
.frost{
  position:fixed;inset:0;pointer-events:none;z-index:80;
  background:
    radial-gradient(ellipse at center,transparent 40%,rgba(168,216,248,.22) 100%),
    linear-gradient(to right,rgba(140,200,240,.15),transparent 22%,transparent 78%,rgba(140,200,240,.15)),
    linear-gradient(to bottom,rgba(140,200,240,.15),transparent 18%,transparent 82%,rgba(140,200,240,.15));
}
@keyframes blizVig{0%,100%{opacity:.38}50%{opacity:.65}}
.blizzard{
  position:fixed;inset:0;pointer-events:none;z-index:60;
  background:
    radial-gradient(ellipse at center,transparent 20%,rgba(150,200,240,.6) 100%),
    linear-gradient(to bottom,rgba(200,230,255,.25),transparent 28%,transparent 72%,rgba(200,230,255,.3));
  animation:blizVig .7s ease-in-out infinite;
}
#blizCanvas{position:fixed;top:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:65;display:none;}
.cmsg{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(3,7,16,.94);border:2px solid var(--accent);
  color:#C8E8F8;padding:14px 22px;font-size:15px;font-weight:bold;
  text-align:center;z-index:200;white-space:pre-line;
  max-width:290px;border-radius:3px;
}
/* ── RESULT ── */
.result-box{padding:14px;background:var(--panel);border:1px solid var(--border);margin:8px 0;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;}
.btn{
  width:100%;padding:10px;background:#0E2040;border:2px solid var(--border);
  color:var(--text);font-size:12px;font-family:monospace;cursor:pointer;
  border-radius:2px;margin:4px 0;
}
.btn:hover{border-color:var(--accent);}
.btn-p{background:#0E3060;border-color:var(--accent);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse .75s infinite;}
</style>
</head>

<script>
// ══════════════════════════════════════════

// ══════════════════════════════════════════
//  SOUND
// ══════════════════════════════════════════
let _ac = null;
const initAudio = () => {
  if(!_ac) _ac = new (window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended') _ac.resume();
};
const beep = (f,t='square',d=.1,v=.05) => {
  try{
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,_ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,_ac.currentTime+d);
    o.connect(g);g.connect(_ac.destination);o.start();o.stop(_ac.currentTime+d);
  }catch(e){}
};
const snd={
  step:()=>beep(280,'square',.05,.025),
  pick:()=>[440,550,660].forEach((f,i)=>setTimeout(()=>beep(f,'triangle',.15,.035),i*60)),
  danger:()=>[200,170,140].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',.22,.08),i*80)),
  freeze:()=>beep(780,'triangle',.35,.055),
  collapse:()=>[140,110,90].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',.28,.09),i*90)),
  bliz:()=>beep(130,'sawtooth',.5,.04),
  wall:()=>beep(140,'square',.06,.02),
  win:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'square',.28,.07),i*110)),
  lose:()=>[300,250,200,150,100].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',.45,.10),i*140)),
  pick2:()=>beep(380,'square',.12,.045),
  skill:()=>[600,700,500].forEach((f,i)=>setTimeout(()=>beep(f,'square',.1,.04),i*50)),
  dice:()=>beep(500,'square',.06,.04),
  diceEnd:()=>[400,500,600,800].forEach((f,i)=>setTimeout(()=>beep(f,'square',.08,.05),i*55)),
};

let G = {};

function mkState(){

    screen:'select', char:null, difficulty:null,
    grid:[], player:{x:AX,y:AY},
    hp:0, maxHp:0, se:100,

// ══════════════════════════════════════════
//  MAP GENERATION (8 × 36)
// ══════════════════════════════════════════
const ci  = (x,y)=>y*GCOLS+x;
const gc  = (x,y)=>G.grid[ci(x,y)];
const sc  = (x,y,u)=>{ G.grid[ci(x,y)]={...G.grid[ci(x,y)],...u}; };
const inB = (x,y)=>x>=0&&x<GCOLS&&y>=0&&y<GROWS;

function genMap(diff){
  const grid=Array.from({length:GCOLS*GROWS},(_,i)=>{
    const x=i%GCOLS,y=Math.floor(i/GCOLS);
    return {type:'floor',item:null,x,y};
  });
  grid[ci(AX,AY)]={type:'airplane',item:null,x:AX,y:AY};

  const safe=(x,y)=>(x===AX&&y===AY)||Math.abs(x-AX)+Math.abs(y-AY)<=2;
  const used=new Set([`${AX},${AY}`]);

  // 卵を右上(7,0)に固定
  const eggX=GCOLS-1,eggY=0;
  grid[ci(eggX,eggY)]={type:'baggage',item:'egg',x:eggX,y:eggY};
  used.add(`${eggX},${eggY}`);

  const pos=[];
  for(let y=0;y<GROWS;y++) for(let x=0;x<GCOLS;x++) if(!safe(x,y)) pos.push({x,y});
  for(let i=pos.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pos[i],pos[j]]=[pos[j],pos[i]];}

  let pi=0;
  const place=(type,item=null)=>{
    while(pi<pos.length){
      const {x,y}=pos[pi++];const k=`${x},${y}`;
      if(!used.has(k)){used.add(k);grid[ci(x,y)]={type,item,x,y};return true;}
    }
    return false;
  };

  for(const {item,n} of PLACE[diff]) for(let i=0;i<n;i++) if(item!=='egg') place('baggage',item);
  place('spare'); place('spare');
  const bats=diff==='EASY'?2:3;
  for(let i=0;i<bats;i++) place('battery');
  place('baggage','goggles');
  for(let i=0;i<SNOW_TILE_COUNT;i++)  place('snowblock');
  for(let i=0;i<BREAK_TILE_COUNT;i++) place('collapse');
  for(let i=0;i<FREEZE_TILE_COUNT;i++) place('frozen');

  return grid;
}

function connected(grid){
  const pass=new Set(grid.filter(c=>c.type!=='wall'&&c.type!=='abyss'&&c.type!=='snowblock').map(c=>`${c.x},${c.y}`));
  const vis=new Set([`${AX},${AY}`]);
  const q=[{x:AX,y:AY}];
  while(q.length){
    const {x,y}=q.shift();
    for(const[dx,dy]of[[0,1],[0,-1],[1,0],[-1,0]]){
      const nx=x+dx,ny=y+dy,k=`${nx},${ny}`;
      if(inB(nx,ny)&&pass.has(k)&&!vis.has(k)){vis.add(k);q.push({x:nx,y:ny});}
    }
  }
  return grid.filter(c=>c.type==='baggage').every(c=>vis.has(`${c.x},${c.y}`));
}

function log(msg,t='info'){
  G.logs.unshift({msg,t});
  if(G.logs.length>7) G.logs.pop();
}
let _mT=null;
function showMsg(msg,dur=1600){
  G.centralMsg=msg;
  if(_mT) clearTimeout(_mT);
  _mT=setTimeout(()=>{G.centralMsg=null;render();},dur);
  render();
}
function damage(amt,reason=''){
  G.hp=Math.max(0,G.hp-amt);
  if(reason) log(`${reason} (-${amt}HP)`,'danger');
  snd.danger();
  if(G.hp<=0&&!G.gameOver){G.gameOver=true;G.won=false;G.screen='result';log('力尽きた…','danger');snd.lose();}
}
function isVis(x,y){
  if(G.blizzardActive){
    if(G.hasGoggles) return true;
    if(G.char==='russian'&&G.russianScopeLeft>0) return true;
    return Math.abs(x-G.player.x)<=1&&Math.abs(y-G.player.y)<=1;
  }
  return true;
}
function hasAllItems(){
  return Object.entries(G.requiredItems).every(([k,v])=>(G.inventory[k]||0)>=v);
}
function itemOffset(x,y){
  const s=(x*73+y*37+x*y*11)%121;
  return `translate(${(s%11)-5}px,${Math.floor(s/11)-5}px)`;
}

// ══════════════════════════════════════════
//  BLIZZARD FX (canvas snowflakes)
// ══════════════════════════════════════════
let _snowAnimId=null;
const _flakes=[];
function startBlizzardFX(){
  const cv=document.getElementById('blizCanvas');
  if(!cv) return;
  cv.style.display='block';
  cv.width=Math.min(420,window.innerWidth);
  cv.height=window.innerHeight;
  _flakes.length=0;
  for(let i=0;i<110;i++) _flakes.push({
    x:Math.random()*cv.width, y:Math.random()*cv.height,
    r:Math.random()*2.2+.4, vx:(Math.random()-.5)*2.2, vy:Math.random()*2.8+.7,
    o:Math.random()*.65+.2
  });
  const ctx=cv.getContext('2d');
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.fillStyle='rgba(170,215,250,.06)';
    ctx.fillRect(0,0,cv.width,cv.height);
    _flakes.forEach(f=>{
      ctx.globalAlpha=f.o;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fill();
      const t=Date.now()/900;
      f.x+=f.vx+Math.sin(t+f.y*.04)*1.4;
      f.y+=f.vy;
      if(f.y>cv.height){f.y=-5;f.x=Math.random()*cv.width;}
      if(f.x<0)f.x=cv.width; if(f.x>cv.width)f.x=0;
    });
    ctx.globalAlpha=1;
    _snowAnimId=requestAnimationFrame(frame);
  }
  if(_snowAnimId) cancelAnimationFrame(_snowAnimId);
  frame();
}
function stopBlizzardFX(){
  if(_snowAnimId){cancelAnimationFrame(_snowAnimId);_snowAnimId=null;}
  const cv=document.getElementById('blizCanvas');
  if(cv) cv.style.display='none';
}
function shuffleItems(){
  const cells=G.grid.filter(c=>c.type==='baggage'&&c.item!=='goggles');
  const items=cells.map(c=>c.item);
  for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}
  cells.forEach((c,i)=>sc(c.x,c.y,{item:items[i]}));
}
function checkBlizzard(){
  if(!G.blizzardActive&&G.frozenCount>=3){
    G.blizzardActive=true;
    shuffleItems();
    log('【猛吹雪発生！】永続！アイテムが吹き飛ばされた！','danger');
    snd.bliz();showMsg('猛吹雪発生！\n永続視界遮断\nアイテム散乱！',2200);
    startBlizzardFX();
  }
}

// ══════════════════════════════════════════
//  TILE EFFECTS
// ══════════════════════════════════════════
function triggerCollapse(x,y){
  G.frozenCount++;
  snd.collapse();
  const goUp=Math.random()<.7;
  const dir=goUp?-1:1;
  const steps=4;
  let ny=y;
  for(let i=0;i<steps;i++){
    const cy=ny+dir;
    if(!inB(x,cy)) break;
    const t=gc(x,cy).type;
    if(t==='abyss'||t==='hole'||t==='wall'||t==='snowblock') break;
    ny=cy;
  }
  if(ny===y){
    // 逃げ場なし：スーツSE-40%ダメージ
    const seDmg=40;
    G.se=Math.max(0,G.se-seDmg);
    log(`【床崩壊】逃げ場なし！奈落落下！防寒スーツSE-${seDmg}%損傷`,'danger');
    _collapseScroll=true;
    showMsg(`奈落に落ちた！\n防寒スーツ損傷\nSE -${seDmg}%！`,1800);
    G.player={x:AX,y:AY};
  } else {
    // 吹き飛ばし：スーツSE-20%ダメージ ＋ スムーススクロール
    const seDmg=20;
    G.se=Math.max(0,G.se-seDmg);
    _collapseScroll=true;
    showMsg(`床崩壊！\n${goUp?'上':'下'}へ吹き飛ばされた！\nSE -${seDmg}%`,1800);
    G.player={x,y:ny};
    log(`【床崩壊】${goUp?'上':'下'}へ${Math.abs(ny-y)}マス吹き飛び！スーツSE-${seDmg}%`,'danger');
    stepOnTile(x,ny,true);
  }
  checkBlizzard();
}
function triggerFrozen(x,y){
  G.frozenCount++;G.frozenNextTurn=true;
  G.se=Math.max(0,G.se-7);
  log(`凍結ゾーン！SE-7%・次ターン移動1固定（累計${G.frozenCount}/3）`,'warning');
  snd.freeze();
  checkBlizzard();
}
function stepOnTile(x,y,skipGimmicks=false){
  const cell=gc(x,y);
  switch(cell.type){
    case 'baggage':{
      const item=cell.item;
      if(item==='goggles'){
        if(!G.blizzardActive){log('吹雪が来るまで装備できない…','warning');break;}
        sc(x,y,{type:'floor'});
        G.hasGoggles=true;
        G.gogglesTurnsLeft=5;
        log('🕶️ 暗視スコープ装備！5ターン間全視界確保！','success');snd.pick();
        showMsg('暗視スコープ装備！\n5ターン有効',1400);
        break;
      }
      if(item==='spray'){
        sc(x,y,{type:'floor'});
        const rec=15+Math.floor(Math.random()*11);
        G.se=Math.min(100,G.se+rec);
        log(`回復スプレー！防寒スーツSE+${rec}%回復！`,'success');snd.pick();
        break;
      }
      if(item==='medkit'){
        sc(x,y,{type:'floor'});
        const hpr=Math.floor(G.maxHp*.25);
        G.hp=Math.min(G.maxHp,G.hp+hpr);
        log(`治療箱！HP+${hpr}回復！`,'success');snd.pick();
        break;
      }
      sc(x,y,{type:'floor'});
      G.inventory[item]=(G.inventory[item]||0)+1;
      const req=G.requiredItems[item]||0;
      const have=G.inventory[item];
      const suffix=req>1?` (${have}/${req})`:'';
      log(`回収：${ITEM_LBL[item]||item}${suffix}！`,'success');snd.pick();
      if(hasAllItems()) showMsg('全荷物を確保！\n飛行機へ戻れ！',2000);
      break;
    }
    case 'battery':{
      const rec=30+Math.floor(Math.random()*21);
      G.se=Math.min(100,G.se+rec);
      const hpr=Math.floor(G.maxHp*.1);G.hp=Math.min(G.maxHp,G.hp+hpr);
      sc(x,y,{type:'floor'});log(`バッテリー！SE+${rec}% HP+${hpr}`,'success');snd.pick();
      break;
    }
    case 'spare':{
      G.pickaxeUses=Math.min(3,G.pickaxeUses+1);
      sc(x,y,{type:'floor'});log('予備ピッケル！使用回数+1','success');snd.pick();
      break;
    }
    case 'collapse':{
      G.revealedGimmicks.add(ci(x,y));
      if(skipGimmicks){sc(x,y,{type:'floor'});break;}
      sc(x,y,{type:'hole'});triggerCollapse(x,y);break;
    }
    case 'cracked':{
      G.se=Math.max(0,G.se-10);
      log('ひび割れた氷！SE-10%追加消費','warning');
      snd.danger();
      break;
    }
    case 'frozen':{
      G.revealedGimmicks.add(ci(x,y));
      if(skipGimmicks){sc(x,y,{type:'floor'});break;}
      sc(x,y,{type:'hole'});triggerFrozen(x,y);break;
    }
    case 'airplane':{
      if(hasAllItems()){
        G.won=true;G.gameOver=true;G.screen='result';
        log('ミッション完了！全荷物を持って帰還！','success');snd.win();
      } else {
        const miss=Object.entries(G.requiredItems)
          .filter(([k,v])=>(G.inventory[k]||0)<v)
          .map(([k,v])=>`${ITEM_LBL[k]||k}(${G.inventory[k]||0}/${v})`);
        log(`まだ${miss.join('、')}が必要だ！`,'warning');
      }
      break;
    }
  }
}

//  MOVEMENT
// ══════════════════════════════════════════
function canPass(x,y,ignore=false){
  if(!inB(x,y)) return false;
  const t=gc(x,y).type;
  if(t==='abyss'||t==='hole') return false;
  if(t==='snowblock') return false;
  if(!ignore&&t==='wall') return false;
  return true;
}
function doMove(nx,ny,consumeSE=true,ignObs=false,skipG=false){
  if(!canPass(nx,ny,ignObs)){if(!ignObs){log('進めない！','warning');snd.wall();}return false;}
  G.player={x:nx,y:ny};snd.step();
  if(consumeSE) G.se=Math.max(0,G.se-G.seCost);
  stepOnTile(nx,ny,skipG);
  return true;
}
function movePlayer(dx,dy){
  if(G.gameOver||G.phase!=='move'||G.diceRolling) return;
  if(G.stepsLeft<=0){log('移動できない！ターン終了してください','warning');render();return;}
  const moved=doMove(G.player.x+dx,G.player.y+dy);
  if(!moved){render();return;}
  G.stepsLeft--;
  if(!G.gameOver&&G.stepsLeft<=0) endTurn();
  else render();
  scrollToPlayer();
}

//  DICE SYSTEM

let _diceTimer=null;
function rollDice(){
  if(G.gameOver||G.phase!=='roll'||G.diceRolling) return;
  G.diceRolling=true;
  G.diceVal=1;
  render(); // 開始時1回だけ：ボタン→「振り中…」に切替
  let count=0;
  const total=10;
  const dots=['','⚀','⚁','⚂','⚃','⚄','⚅'];
  const tick=()=>{
    G.diceVal=Math.floor(Math.random()*6)+1;
    snd.dice();
    count++;
    // dice-face のテキストだけ書き換え（グリッド再生成しない）
    const el=document.querySelector('.dice-face');
    if(el) el.textContent=dots[G.diceVal];
    if(count<total){_diceTimer=setTimeout(tick,count<7?70:110);}
    else{
      let roll=Math.floor(Math.random()*6)+1;
      if(G.se<=0) roll=Math.min(roll,3);
      if(G.frozenNextTurn){roll=Math.min(roll,1);G.frozenNextTurn=false;}
      G.diceVal=roll;
      G.stepsLeft=roll;
      G.diceRolling=false;
      G.phase='move';
      snd.diceEnd();
      log(`サイコロ：${roll} → ${roll}歩移動可能`,'info');
      render(); // 終了時1回だけ：移動UIに切替
    }
  };
  tick();
}

function useBattery(){
  initAudio();
  if(G.batteryCharges<=0||G.gameOver){log('バッテリー残量なし！','warning');render();return;}
  G.batteryCharges--;
  G.se=Math.min(100,G.se+30);
  log(`🔋 バッテリー回復！SE+30%（残り${G.batteryCharges}/3回）`,'success');
  snd.pick();render();
}

function endTurn(){
  G.turn++;
  G.pickaxeUsedThisTurn=false;
  if(G.russianScopeLeft>0) G.russianScopeLeft--;
  if(G.se<=0){const d=Math.floor(G.maxHp*.03);damage(d,'防寒エネルギー切れ（凍傷）');}
  G.phase='roll';
  G.diceVal=null;
  if(G.hasGoggles){
    G.gogglesTurnsLeft--;
    if(G.gogglesTurnsLeft<=0){
      G.hasGoggles=false;
      log('🕶️ 暗視スコープのバッテリーが切れた！','danger');
      showMsg('暗視スコープ\nバッテリー切れ！',1800);
    }
  }
  if(!G.gameOver) render();
}

// ══════════════════════════════════════════
//  PICKAXE / INVESTIGATE
// ══════════════════════════════════════════
function doPickaxe(dx,dy){
  const tx=G.player.x+dx,ty=G.player.y+dy;
  if(!inB(tx,ty)){G.actionMode=null;render();return;}
  if(G.pickaxeUses<=0){log('ピッケルが残っていない！','warning');G.actionMode=null;render();return;}
  if(G.pickaxeUsedThisTurn){log('ピッケルは1ターンに1回のみ使用可能','warning');G.actionMode=null;render();return;}
  if(G.phase!=='move'){G.actionMode=null;render();return;}
  G.se=Math.max(0,G.se-1);
  G.pickaxeUses--;
  G.pickaxeUsedThisTurn=true;
  snd.pick2();
  const cell=gc(tx,ty);
  const isTrap=cell.type==='collapse'||cell.type==='frozen';
  if(isTrap){
    const trapName=cell.type==='collapse'?'床崩壊トラップ':'凍結トラップ';
    sc(tx,ty,{type:'hole'});
    G.revealedGimmicks.delete(ci(tx,ty));
    log(`【ピッケル】${trapName}を解除！穴になった（残${G.pickaxeUses}回）`,'success');
    showMsg('危険を除去した！',1200);
    snd.pick();
  } else if(cell.type==='snowblock'){
    G.pickaxeUses++;G.pickaxeUsedThisTurn=false;G.se=Math.min(100,G.se+1);
    log('雪が深すぎてピッケルが刺さらない！（返却）','warning');
  } else if(cell.type==='wall'){
    sc(tx,ty,{type:'hole'});
    log(`【ピッケル】壁を掘り抜いた（残${G.pickaxeUses}回）`,'success');
  } else if(cell.type==='hole'||cell.type==='abyss'){
    G.pickaxeUses++;G.pickaxeUsedThisTurn=false;G.se=Math.min(100,G.se+1);
    log('そこは既に穴だ！','warning');
  } else {
    log(`【ピッケル調査】安全なマスだ（残${G.pickaxeUses}回）`,'info');
  }
  G.actionMode=null;render();
}

// ══════════════════════════════════════════
//  SKILLS
// ══════════════════════════════════════════
function doSkill(dx,dy){
  if(G.skillUses<=0){log('スキル残回数なし！','warning');G.actionMode=null;render();return;}

  // ── ロシア兵：暗視スコープ（方向不要・即時発動） ──
  if(G.char==='russian'){
    G.skillUses--;snd.skill();
    G.russianScopeLeft=2;
    log('ロシア兵：スコープ起動、吹雪の奥を捉えた！','success');
    showMsg('暗視スコープ起動！\n2ターン間全視界確保',1500);
    G.actionMode=null;render();return;
  }

  if(G.phase!=='move'){G.actionMode=null;render();return;}
  G.skillUses--;G.se=Math.max(0,G.se-1);snd.skill();

  // ── キャプテン：ピッケル探索（2マス先まで調査） ──
  if(G.char==='captain'){
    let scanned=0;
    for(let d=1;d<=2;d++){
      const tx=G.player.x+dx*d,ty=G.player.y+dy*d;
      if(!inB(tx,ty)) break;
      const c=gc(tx,ty);
      const nm=c.type==='frozen'?'❄凍結ゾーン（危険）':
               c.type==='collapse'?'⚠床崩壊マス（危険）':
               c.type==='baggage'?`📦荷物(${ITEM_LBL[c.item]||'?'})`:
               c.type==='battery'?'🔋バッテリー':
               c.type==='spare'?'⛏予備ピッケル':
               c.type==='wall'?'壁（通行不可）':
               c.type==='snowblock'?'❄雪（通行不可）':
               (c.type==='hole'||c.type==='abyss')?'穴（通行不可）':'安全なマス';
      const isDanger=c.type==='collapse'||c.type==='frozen';
      if(isDanger) G.revealedGimmicks.add(ci(tx,ty));
      log(`[探索]${d}マス先＝${nm}`,isDanger?'warning':'info');
      scanned++;
    }
    if(!scanned) log('[探索] その先は範囲外','warning');
    else log('キャプテン：2マス先まで安全を確認した。','info');
    G.actionMode=null;render();return;
  }

  // ── ルーキー：がむしゃら（追加2マス移動） ──
  if(G.char==='rookie'){
    log('ルーキー：がむしゃらに2マス突き進んだ！','success');
    let moved=0;
    for(let i=0;i<2&&!G.gameOver;i++){
      const nx=G.player.x+dx,ny=G.player.y+dy;
      if(!canPass(nx,ny)){snd.wall();break;}
      G.player={x:nx,y:ny};G.se=Math.max(0,G.se-G.seCost);snd.step();
      stepOnTile(nx,ny);if(G.gameOver)break;moved++;
    }
    if(!moved) log('ルーキー：前に進めない！','warning');
    G.actionMode=null;if(!G.gameOver){render();scrollToPlayer();}return;
  }

  // ── 死刑囚：障害物跳躍（壁・穴を飛び越え） ──
  if(G.char==='prisoner'){
    let skipped=false,found=false,lx=G.player.x,ly=G.player.y;
    for(let d=1;d<=3;d++){
      const nx=G.player.x+dx*d,ny=G.player.y+dy*d;
      if(!inB(nx,ny)) break;
      const t=gc(nx,ny).type;
      if(t==='abyss') break;
      if(!canPass(nx,ny)){skipped=true;continue;}
      lx=nx;ly=ny;found=true;break;
    }
    if(found&&skipped){
      G.player={x:lx,y:ly};G.se=Math.max(0,G.se-G.seCost);snd.step();
      stepOnTile(lx,ly);
      log('死刑囚：奈落を飛び越えて着地した！','success');
    } else if(found){
      G.player={x:lx,y:ly};G.se=Math.max(0,G.se-G.seCost);snd.step();
      stepOnTile(lx,ly);
      log('死刑囚：2マス先に跳んだ（障害物なし）','info');
    } else {
      G.skillUses++;G.se=Math.min(100,G.se+1);
      log('死刑囚：行き先がない！スキル返却','warning');
    }
    G.actionMode=null;if(!G.gameOver){render();scrollToPlayer();}return;
  }
}

//  START GAME
// ══════════════════════════════════════════
function startGame(charId,diff){
  G=mkState();G.char=charId;G.difficulty=diff;
  G.seCost=SE_COST[diff];G.requiredItems={...REQ[diff]};
  const cd=CHARS[charId];G.hp=cd.hp;G.maxHp=cd.hp;G.skillUses=cd.skillMax;
  stopBlizzardFX();
  G.screen='game';
  let tries=0;
  do{G.grid=genMap(diff);tries++;}while(!connected(G.grid)&&tries<30);
  log(`出撃！${cd.name} / ${DIFF_LBL[diff]}`,'success');
  log(`目標：${Object.entries(G.requiredItems).map(([k,v])=>`${ITEM_LBL[k]||k}×${v}`).join('・')}を回収して帰還`,'info');
  render();scrollToPlayer();
}

//  AUTO-SCROLL TO PLAYER
// ══════════════════════════════════════════
let _collapseScroll=false;
function scrollToPlayer(){
  const smooth=_collapseScroll;
  _collapseScroll=false; // 常にここでリセット（gaがnullでも残らない）
  setTimeout(()=>{
    const ga=document.querySelector('.grid-area');
    if(!ga) return;
    const CELL=45;
    const target=G.player.y*CELL-(ga.clientHeight/2)+CELL/2;
    if(smooth){
      ga.scrollTo({top:Math.max(0,target),behavior:'smooth'});
    } else {
      ga.scrollTop=Math.max(0,target);
    }
  },smooth?130:30);
}

function bar(val,max,cFn){
  const pct=Math.max(0,Math.min(100,(val/max)*100));
  return `<div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cFn(pct)}"></div></div>`;
}
function renderGrid(){
  let h='<div class="grid">';
  for(let y=0;y<GROWS;y++) for(let x=0;x<GCOLS;x++){
    const cell=gc(x,y);
    const vis=isVis(x,y);
    const isP=G.player.x===x&&G.player.y===y;
    const revealed=G.revealedGimmicks.has(ci(x,y));
    let dt=cell.type;
    if((dt==='collapse'||dt==='frozen')&&!revealed) dt='floor';
    const iceV = ((x*3 + y*7 + x*y) % 5);
    let cls,inner='';
    if(dt==='snowblock'){cls='cell c-snow';inner=SVGS.snowblock;}
    else if(!vis && !(cell.type==='baggage' && (cell.item==='egg'||cell.item==='goggles'))){cls='cell c-fog';}
    else switch(dt){
      case 'floor':    cls='cell c-floor'; inner=SVGS['ice'+iceV]; break;
      case 'wall':     cls='cell c-wall';  inner=SVGS.wall;  break;
      case 'abyss':    cls='cell c-abyss'; inner=SVGS.abyss; break;
      case 'airplane': cls='cell c-airplane'; inner=SVGS.airplane; break;
      case 'baggage':{
        cls='cell c-floor';
        const off=itemOffset(x,y);
        inner=`${SVGS['ice'+iceV]}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transform:${off};line-height:0">${SVGS[cell.item]||SVGS.baggage}</div>`;
        break;
      }
      case 'battery':  cls='cell c-floor';  inner=`${SVGS['ice'+iceV]}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;line-height:0">${SVGS.battery}</div>`;  break;
      case 'spare':    cls='cell c-floor';  inner=`${SVGS['ice'+iceV]}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;line-height:0">${SVGS.spare}</div>`;    break;
      case 'frozen':   cls='cell c-frozen-hit'; inner=SVGS.frozen;  break;
      case 'collapse': cls='cell c-collapse-warn'; inner=SVGS.cwarn; break;
      case 'cracked':  cls='cell c-cracked';        inner=SVGS.cracked; break;
      case 'hole':     cls='cell c-hole';           inner=SVGS.hole;  break;
      default:         cls='cell c-floor'; inner=SVGS['ice'+iceV];
    }
    // Action target highlight
    const isAdj=Math.abs(x-G.player.x)+Math.abs(y-G.player.y)===1;
    const isAxis=x===G.player.x||y===G.player.y;
    const dist=Math.abs(x-G.player.x)+Math.abs(y-G.player.y);
    if(G.actionMode==='pickaxe'&&isAdj) cls+=' c-target';
    if(G.actionMode==='skill'&&dist>0){
      if(G.char==='captain'){
        if((x===G.player.x||y===G.player.y)&&dist<=2) cls+=' c-target';
      } else if(G.char==='rookie'||G.char==='prisoner'){
        if(isAxis) cls+=' c-target';
      }
    }
    h+=`<div class="${cls}" onclick="onCell(${x},${y})" ${isP?'data-player="1"':''}>
      ${inner}
      ${isP?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;">${charSVG(G.char,34,G.playerDir)}</div>`:''}
    </div>`;
  }
  h+='</div>';return h;
}

function renderDice(){

function renderInv(){
  const chips=Object.entries(G.requiredItems).map(([k,v])=>{

function renderLog(){
  return `<div class="log">${G.logs.slice(0,6).map(e=>`<div class="l-${e.t}">${e.msg}</div>`).join('')}</div>`;

function renderCtrl(){
  const canAct=G.phase==='move'&&!G.diceRolling&&!G.gameOver;
  const cd=CHARS[G.char];
  const canSkill=G.char==='russian'
    ?(G.skillUses>0&&!G.gameOver)
    :(canAct&&G.skillUses>0);
  const skDis=!canSkill;
  const pkDis=G.pickaxeUses<=0||G.pickaxeUsedThisTurn||!canAct;
  const sOn=G.actionMode==='skill';
  const pOn=G.actionMode==='pickaxe';
  const warns=[];
  if(G.blizzardActive) warns.push(G.hasGoggles?`🕶️ 暗視スコープ残${G.gogglesTurnsLeft}T`:'⛄ 猛吹雪（永続・視界1マス）');
  if(G.char==='russian'&&G.russianScopeLeft>0) warns.push(`🔭 スコープ残${G.russianScopeLeft}T`);
  if(G.frozenNextTurn) warns.push('❄ 凍結：次ターン最大1');
  if(G.se<=0) warns.push('<span class="pulse" style="color:#EF5350">⚠ エネルギー切れ！移動最大3・凍傷進行</span>');
  const skillLabel=G.char==='russian'&&G.russianScopeLeft>0
    ?`スコープ中 (${G.skillUses})`
    :`${cd.skill} (${G.skillUses})`;
  return `<div class="ctrl">
    <div>
      <div class="dpad">
        <div class="dbtn-blank"></div>
        <button class="dbtn" onclick="onDP(0,-1)" ${!canAct?'disabled':''}>↑</button>
        <div class="dbtn-blank"></div>
        <button class="dbtn" onclick="onDP(-1,0)" ${!canAct?'disabled':''}>←</button>
        <div class="dbtn-blank" style="background:#0B1829;border-radius:50%;opacity:.25"></div>
        <button class="dbtn" onclick="onDP(1,0)" ${!canAct?'disabled':''}>→</button>
        <div class="dbtn-blank"></div>
        <button class="dbtn" onclick="onDP(0,1)" ${!canAct?'disabled':''}>↓</button>
        <div class="dbtn-blank"></div>
      </div>
    </div>
    <div class="act-col">
      <button class="act-btn ${sOn?'on':''}" onclick="toggleSkill()" ${skDis?'disabled':''}>
        ${skillLabel}
      </button>
      <button class="act-btn ${pOn?'on':''}" onclick="togglePick()" ${pkDis?'disabled':''}>
        ${G.pickaxeUsedThisTurn?'ピッケル 使用済':'ピッケル ('+G.pickaxeUses+')'}
      </button>
      ${warns.length?`<div class="ctrl-notes">${warns.join('<br>')}</div>`:''}
    </div>
  </div>`;
}
function render(){
  const app=document.getElementById('app');if(!app)return;
  if(G.screen==='select'){stopBlizzardFX();app.innerHTML=renderSelect();return;}
  if(G.screen==='difficulty'){app.innerHTML=renderDiff();return;}
  if(G.screen==='result'){stopBlizzardFX();app.innerHTML=renderResult();return;}
  const _gaOld=document.getElementById('gridArea');
  const _savedScroll=_gaOld?_gaOld.scrollTop:0;
  const frost=G.hp<=G.maxHp*.2||G.se<=20;
  const bliz=G.blizzardActive;
  app.innerHTML=`
    ${frost?'<div class="frost"></div>':''}
    ${bliz?'<div class="blizzard"></div>':''}
    ${G.centralMsg?`<div class="cmsg">${G.centralMsg}</div>`:''}
    <div class="game-wrap">
      ${renderStatus()}
      ${renderInv()}
      <div class="grid-area" id="gridArea">${renderGrid()}</div>
      ${renderDice()}
      ${renderLog()}
      ${renderCtrl()}
    </div>`;
  if(_savedScroll>0){const _ga=document.getElementById('gridArea');if(_ga)_ga.scrollTop=_savedScroll;}
}

// ══════════════════════════════════════════
//  EVENT HANDLERS
// ══════════════════════════════════════════
function selChar(id){initAudio();G=mkState();G.char=id;G.screen='difficulty';render();}
function selDiff(d){initAudio();startGame(G.char,d);}
function toggleSkill(){
  initAudio();
  if(G.skillUses<=0){log('スキル残回数なし！','warning');render();return;}
  if(G.char==='russian'){
    doSkill(0,0);return;
  }
  if(G.phase!=='move') return;
  G.actionMode=G.actionMode==='skill'?null:'skill';render();
}
function togglePick(){
  initAudio();
  if(G.pickaxeUses<=0||G.pickaxeUsedThisTurn||G.phase!=='move') return;
  G.actionMode=G.actionMode==='pickaxe'?null:'pickaxe';render();
}
function setDir(dx,dy){if(dx>0)G.playerDir='east';else if(dx<0)G.playerDir='west';else if(dy>0)G.playerDir='south';else if(dy<0)G.playerDir='north';}
function onDP(dx,dy){
  initAudio();
  if(G.gameOver) return;
  setDir(dx,dy);
  if(G.actionMode==='pickaxe'){doPickaxe(dx,dy);return;}
  if(G.actionMode==='skill'){doSkill(dx,dy);return;}
  movePlayer(dx,dy);
}
function onCell(x,y){
  initAudio();if(G.gameOver)return;
  const dx=x-G.player.x,dy=y-G.player.y;
  if(G.actionMode==='pickaxe'&&Math.abs(dx)+Math.abs(dy)===1){doPickaxe(dx,dy);return;}
  if(G.actionMode==='skill'){
    if(dx===0&&dy===0) return;
    const adx=Math.abs(dx),ady=Math.abs(dy);
    // Cardinal direction normalize
    let ndx=0,ndy=0;
    if(adx>0&&ady===0) ndx=dx>0?1:-1;
    else if(ady>0&&adx===0) ndy=dy>0?1:-1;
    else if(adx>=ady) ndx=dx>0?1:-1;
    else ndy=dy>0?1:-1;
    if(ndx!==0||ndy!==0) doSkill(ndx,ndy);
    return;
  }
  if(Math.abs(dx)+Math.abs(dy)===1){setDir(dx,dy);movePlayer(dx,dy);}
}
function onEnd(){

let _bgmTimer=null,_bgmType=null;
const _BGM={
  title:{notes:[261,329,392,523,392,329,261,329,392,440,392,329,220,277,329,440,329,277],dur:480,wave:'triangle',vol:.055},
  game: {notes:[220,262,330,392,330,262,185,220,277,349,277,220,196,247,294,392,294,247],dur:320,wave:'square',  vol:.032},
};
function stopBGM(){if(_bgmTimer){clearTimeout(_bgmTimer);_bgmTimer=null;}_bgmType=null;}
function playBGM(type){
  if(_bgmType===type||!_ac) return;
  stopBGM();
  _bgmType=type;
  const cfg=_BGM[type];let idx=0;
  (function tick(){
    if(_bgmType!==type) return;
    const f=cfg.notes[idx++%cfg.notes.length];
    const osc=_ac.createOscillator(),g=_ac.createGain();
    osc.connect(g);g.connect(_ac.destination);
    osc.type=cfg.wave;osc.frequency.value=f;
    g.gain.setValueAtTime(cfg.vol,_ac.currentTime);
    g.gain.linearRampToValueAtTime(0,_ac.currentTime+cfg.dur/1000*.75);
    osc.start(_ac.currentTime);osc.stop(_ac.currentTime+cfg.dur/1000*.75);
    _bgmTimer=setTimeout(tick,cfg.dur);
  })();
}
